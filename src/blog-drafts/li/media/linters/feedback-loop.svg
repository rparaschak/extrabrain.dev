<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2dd4bf"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#2d3748"/>

  <!-- Title -->
  <text x="540" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#ffffff" text-anchor="middle">The Feedback Loop</text>
  <text x="540" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">Automated quality pipeline for AI coding agents</text>

  <!-- AGENT node -->
  <rect x="390" y="160" width="300" height="60" rx="14" fill="#374151" stroke="#4b5563" stroke-width="2"/>
  <text x="540" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">Agent</text>

  <!-- Arrow: Agent → Code -->
  <line x1="540" y1="220" x2="540" y2="260" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="558" y="247" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">writes</text>

  <!-- CODE node -->
  <rect x="390" y="270" width="300" height="60" rx="14" fill="#374151" stroke="#4b5563" stroke-width="2"/>
  <text x="540" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">Code</text>

  <!-- Arrow: Code → Linter -->
  <line x1="540" y1="330" x2="540" y2="370" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="558" y="357" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">checked by</text>

  <!-- LINTER node -->
  <rect x="390" y="380" width="300" height="60" rx="14" fill="#374151" stroke="#2dd4bf" stroke-width="2"/>
  <text x="540" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#2dd4bf" text-anchor="middle">Linter</text>

  <!-- Feedback loop 1: Linter → Agent (left side) -->
  <path d="M 390 410 L 220 410 L 220 190 L 390 190" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrow-teal)"/>
  <text x="130" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2dd4bf" text-anchor="middle">feedback:</text>
  <text x="130" y="316" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2dd4bf" text-anchor="middle">warnings</text>

  <!-- Arrow: Linter → Tests -->
  <line x1="540" y1="440" x2="540" y2="480" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="558" y="467" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">then</text>

  <!-- TESTS node -->
  <rect x="390" y="490" width="300" height="60" rx="14" fill="#374151" stroke="#2dd4bf" stroke-width="2"/>
  <text x="540" y="528" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#2dd4bf" text-anchor="middle">Tests</text>

  <!-- Feedback loop 2: Tests → Agent (right side) -->
  <path d="M 690 520 L 860 520 L 860 190 L 690 190" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrow-teal)"/>
  <text x="950" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2dd4bf" text-anchor="middle">feedback:</text>
  <text x="950" y="373" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2dd4bf" text-anchor="middle">failures</text>

  <!-- Arrow: Tests → User -->
  <line x1="540" y1="550" x2="540" y2="590" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="558" y="577" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4ade80">all pass</text>

  <!-- USER node -->
  <rect x="390" y="600" width="300" height="60" rx="14" fill="#374151" stroke="#4ade80" stroke-width="2"/>
  <text x="540" y="638" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#4ade80" text-anchor="middle">User</text>

  <!-- Divider -->
  <line x1="140" y1="710" x2="940" y2="710" stroke="#4b5563" stroke-width="1"/>

  <!-- Summary -->
  <text x="540" y="760" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">One pipeline, continuous feedback</text>
</svg>