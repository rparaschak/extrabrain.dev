<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 506" width="900" height="506">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    </marker>
    <marker id="arrowGreen2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#3fb950" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="506" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <g stroke="#c9d1d9" stroke-width="0.5" opacity="0.04">
    <line x1="60" y1="0" x2="60" y2="506"/><line x1="120" y1="0" x2="120" y2="506"/>
    <line x1="180" y1="0" x2="180" y2="506"/><line x1="240" y1="0" x2="240" y2="506"/>
    <line x1="300" y1="0" x2="300" y2="506"/><line x1="360" y1="0" x2="360" y2="506"/>
    <line x1="420" y1="0" x2="420" y2="506"/><line x1="480" y1="0" x2="480" y2="506"/>
    <line x1="540" y1="0" x2="540" y2="506"/><line x1="600" y1="0" x2="600" y2="506"/>
    <line x1="660" y1="0" x2="660" y2="506"/><line x1="720" y1="0" x2="720" y2="506"/>
    <line x1="780" y1="0" x2="780" y2="506"/><line x1="840" y1="0" x2="840" y2="506"/>
    <line x1="0" y1="60" x2="900" y2="60"/><line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/><line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="300" x2="900" y2="300"/><line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="0" y1="420" x2="900" y2="420"/><line x1="0" y1="480" x2="900" y2="480"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#30363d" stroke-width="1.5" fill="none" opacity="0.3">
    <polyline points="20,50 20,20 50,20"/>
    <polyline points="850,20 880,20 880,50"/>
    <polyline points="880,456 880,486 850,486"/>
    <polyline points="50,486 20,486 20,456"/>
  </g>

  <!-- Title -->
  <text x="450" y="52" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="12" fill="#8b949e" letter-spacing="3">THE JUNIOR DEV MODEL</text>
  <line x1="395" y1="60" x2="505" y2="60" stroke="#7c3aed" stroke-width="2" opacity="0.8"/>

  <!-- === AI AGENT NODE (left) — Hexagon === -->
  <!-- Ambient glow -->
  <circle cx="200" cy="210" r="80" fill="#7c3aed" opacity="0.08" filter="url(#softGlow)"/>
  <!-- Dashed orbit -->
  <circle cx="200" cy="210" r="72" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="5 5" opacity="0.3"/>
  <!-- Hexagon shape -->
  <polygon points="200,142 258,176 258,244 200,278 142,244 142,176" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-width="2"/>
  <!-- Code icon </> -->
  <g stroke="#c4b5fd" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="178,198 165,210 178,222"/>
    <polyline points="222,198 235,210 222,222"/>
    <line x1="212" y1="193" x2="188" y2="227"/>
  </g>
  <!-- Label -->
  <text x="200" y="303" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="14" font-weight="600" fill="#c4b5fd">AI Agent</text>
  <text x="200" y="318" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" fill="#8b949e">like a junior dev</text>

  <!-- === RIGHT SIDE NODES (wider boxes: 190x52) === -->

  <!-- Node 1: Good Examples (green, center y=110) -->
  <circle cx="625" cy="110" r="50" fill="#22c55e" opacity="0.06" filter="url(#softGlow)"/>
  <rect x="530" y="84" width="190" height="52" rx="8" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Checkmark icon -->
  <g stroke="#86efac" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="548,110 556,118 572,102"/>
  </g>
  <text x="588" y="106" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#86efac">Good</text>
  <text x="588" y="120" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#86efac">Examples</text>

  <!-- Node 2: Clear Boundaries (purple, center y=177) -->
  <circle cx="625" cy="177" r="50" fill="#7c3aed" opacity="0.06" filter="url(#softGlow)"/>
  <rect x="530" y="151" width="190" height="52" rx="8" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Bracket/boundary icon -->
  <g stroke="#c4b5fd" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="553,167 547,177 553,187"/>
    <polyline points="573,167 579,177 573,187"/>
  </g>
  <text x="592" y="173" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#c4b5fd">Clear</text>
  <text x="592" y="187" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#c4b5fd">Boundaries</text>

  <!-- Node 3: Constant Feedback (amber, center y=244) -->
  <circle cx="625" cy="244" r="50" fill="#f59e0b" opacity="0.06" filter="url(#softGlow)"/>
  <rect x="530" y="218" width="190" height="52" rx="8" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Chat/speech bubble icon -->
  <g stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M550,236 h16 a3,3 0 0,1 3,3 v10 a3,3 0 0,1 -3,3 h-10 l-4,4 v-4 h-2 a3,3 0 0,1 -3,-3 v-10 a3,3 0 0,1 3,-3 z"/>
  </g>
  <text x="588" y="240" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#fbbf24">Constant</text>
  <text x="588" y="254" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#fbbf24">Feedback</text>

  <!-- Node 4: Clear Objective (green, center y=311) -->
  <circle cx="625" cy="311" r="50" fill="#3fb950" opacity="0.06" filter="url(#softGlow)"/>
  <rect x="530" y="285" width="190" height="52" rx="8" fill="#3fb950" fill-opacity="0.08" stroke="#3fb950" stroke-width="1.5"/>
  <!-- Target/bullseye icon -->
  <g stroke="#86efac" stroke-width="1.5" fill="none">
    <circle cx="560" cy="311" r="10"/>
    <circle cx="560" cy="311" r="5"/>
    <circle cx="560" cy="311" r="1.5" fill="#86efac"/>
  </g>
  <text x="580" y="307" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#86efac">Clear</text>
  <text x="580" y="321" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#86efac">Objective</text>

  <!-- === CURVED CONNECTIONS from each node TO AI Agent === -->
  <!-- From Good Examples to Agent -->
  <path d="M528,110 C440,110 350,140 262,185" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <!-- From Clear Boundaries to Agent -->
  <path d="M528,177 C440,177 350,185 262,198" fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <!-- From Constant Feedback to Agent -->
  <path d="M528,244 C440,244 350,235 262,222" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <!-- From Clear Objective to Agent -->
  <path d="M528,311 C440,305 350,280 262,240" fill="none" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen2)"/>

  <!-- Small dots along the connection lines for visual interest -->
  <g opacity="0.4">
    <circle cx="490" cy="112" r="2" fill="#22c55e"/>
    <circle cx="420" cy="125" r="2" fill="#22c55e"/>
    <circle cx="350" cy="148" r="2" fill="#22c55e"/>
    <circle cx="490" cy="178" r="2" fill="#7c3aed"/>
    <circle cx="420" cy="182" r="2" fill="#7c3aed"/>
    <circle cx="350" cy="189" r="2" fill="#7c3aed"/>
    <circle cx="490" cy="243" r="2" fill="#f59e0b"/>
    <circle cx="420" cy="238" r="2" fill="#f59e0b"/>
    <circle cx="350" cy="232" r="2" fill="#f59e0b"/>
    <circle cx="490" cy="308" r="2" fill="#3fb950"/>
    <circle cx="420" cy="295" r="2" fill="#3fb950"/>
    <circle cx="350" cy="272" r="2" fill="#3fb950"/>
  </g>

  <!-- === TERMINAL SNIPPET === -->
  <rect x="170" y="365" width="560" height="120" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="170" y="365" width="560" height="28" rx="8" fill="#161b22"/>
  <rect x="170" y="385" width="560" height="8" fill="#161b22"/>
  <!-- Window dots -->
  <circle cx="190" cy="379" r="5" fill="#f85149"/>
  <circle cx="208" cy="379" r="5" fill="#f0c746"/>
  <circle cx="226" cy="379" r="5" fill="#3fb950"/>
  <!-- Terminal title -->
  <text x="450" y="383" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" fill="#8b949e">terminal</text>
  <!-- Terminal content -->
  <g font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11">
    <text x="188" y="410" fill="#8b949e">$ <tspan fill="#6e7681"># What does a junior developer need?</tspan></text>
    <text x="188" y="427" fill="#3fb950"><tspan fill="#22c55e">&#10003;</tspan> Good examples to follow</text>
    <text x="188" y="444" fill="#3fb950"><tspan fill="#22c55e">&#10003;</tspan> Clear boundaries</text>
    <text x="188" y="461" fill="#3fb950"><tspan fill="#22c55e">&#10003;</tspan> Constant feedback</text>
    <text x="188" y="478" fill="#3fb950"><tspan fill="#22c55e">&#10003;</tspan> Clear objective</text>
    <text x="580" y="478" fill="#3fb950" font-size="10" opacity="0.7">setup complete</text>
  </g>

  <!-- Footer -->
  <text x="450" y="500" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" letter-spacing="2" fill="#30363d">EXTRABRAIN.DEV</text>
</svg>