<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220">
  <defs>
    <linearGradient id="saBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="saGlowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="saGlowAmber" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="saGlowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="220" rx="8" fill="url(#saBg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#c9d1d9" stroke-width="0.5">
    <line x1="60" y1="0" x2="60" y2="220"/>
    <line x1="120" y1="0" x2="120" y2="220"/>
    <line x1="180" y1="0" x2="180" y2="220"/>
    <line x1="240" y1="0" x2="240" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="360" y1="0" x2="360" y2="220"/>
    <line x1="420" y1="0" x2="420" y2="220"/>
    <line x1="480" y1="0" x2="480" y2="220"/>
    <line x1="540" y1="0" x2="540" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="660" y1="0" x2="660" y2="220"/>
  </g>

  <!-- Decorative corners -->
  <g stroke="#30363d" stroke-width="1" fill="none" opacity="0.3">
    <polyline points="15,35 15,15 35,15"/>
    <polyline points="665,15 685,15 685,35"/>
    <polyline points="685,185 685,205 665,205"/>
    <polyline points="35,205 15,205 15,185"/>
  </g>

  <!-- Title -->
  <text x="350" y="42" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="16" font-weight="700" fill="#e6edf3">WITHOUT SUBAGENTS</text>

  <!-- Bar: x=50, width=600, y=62, height=46 -->
  <!-- Scale: 600px = 180K tokens, 3.33px per 1K -->
  <!-- 100K at x=383, 150K at x=550 -->
  <!-- Segments: FE Rules 8K, BE Rules 8K, Planning 45K, BE Coding 45K, FE Coding 45K, Tests 30K -->
  <!-- Cumulative: 8, 16, 61, 106, 151, 181 -->

  <!-- GREEN ZONE: 0–100K (x=50 to x=383) -->
  <rect x="50" y="62" width="333" height="46" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" filter="url(#saGlowGreen)"/>

  <!-- YELLOW ZONE: 100K–150K (x=383 to x=550) -->
  <rect x="383" y="62" width="167" height="46" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5" filter="url(#saGlowAmber)"/>

  <!-- RED ZONE: 150K+ (x=550 to x=650) -->
  <rect x="550" y="62" width="100" height="46" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5" filter="url(#saGlowRed)"/>
  <rect x="644" y="62" width="6" height="46" rx="6" fill="#ef4444" opacity="0.12"/>

  <!-- Segment divider lines -->
  <!-- 8K at x=77 -->
  <line x1="77" y1="62" x2="77" y2="108" stroke="#8b949e" stroke-width="0.5" opacity="0.4"/>
  <!-- 16K at x=103 -->
  <line x1="103" y1="62" x2="103" y2="108" stroke="#8b949e" stroke-width="0.5" opacity="0.4"/>
  <!-- 61K at x=253 -->
  <line x1="253" y1="62" x2="253" y2="108" stroke="#8b949e" stroke-width="0.5" opacity="0.4"/>
  <!-- 106K at x=403 -->
  <line x1="403" y1="62" x2="403" y2="108" stroke="#8b949e" stroke-width="0.5" opacity="0.4"/>
  <!-- 151K at x=553 -->
  <line x1="553" y1="62" x2="553" y2="108" stroke="#8b949e" stroke-width="0.5" opacity="0.4"/>

  <!-- Segment labels inside bar -->
  <text x="63" y="82" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="7" font-weight="600" fill="#86efac">FE</text>
  <text x="63" y="92" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="7" font-weight="600" fill="#86efac">Rules</text>
  <text x="90" y="82" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="7" font-weight="600" fill="#86efac">BE</text>
  <text x="90" y="92" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="7" font-weight="600" fill="#86efac">Rules</text>
  <text x="178" y="89" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="600" fill="#86efac">Planning</text>
  <text x="328" y="89" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="600" fill="#86efac">BE Coding</text>
  <text x="478" y="89" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="600" fill="#fbbf24">FE Coding</text>
  <text x="601" y="89" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="600" fill="#fca5a5">Tests</text>

  <!-- Token values UNDER the bar -->
  <text x="63" y="124" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="9" fill="#8b949e">8K</text>
  <text x="90" y="124" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="9" fill="#8b949e">8K</text>
  <text x="178" y="124" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="9" fill="#8b949e">45K</text>
  <text x="328" y="124" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="9" fill="#8b949e">45K</text>
  <text x="478" y="124" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="9" fill="#8b949e">45K</text>
  <text x="601" y="124" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="9" fill="#8b949e">30K</text>

  <!-- Tick marks at zone boundaries -->
  <line x1="50" y1="136" x2="50" y2="144" stroke="#8b949e" stroke-width="1"/>
  <line x1="383" y1="136" x2="383" y2="144" stroke="#8b949e" stroke-width="1"/>
  <line x1="550" y1="136" x2="550" y2="144" stroke="#8b949e" stroke-width="1"/>
  <line x1="650" y1="136" x2="650" y2="144" stroke="#8b949e" stroke-width="1"/>

  <!-- Tick labels -->
  <text x="50" y="158" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#8b949e">0K</text>
  <text x="383" y="158" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#8b949e">100K</text>
  <text x="550" y="158" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#8b949e">150K</text>

  <!-- Warning text -->
  <text x="350" y="190" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" font-weight="600" fill="#fca5a5">High chance of autocompact. Planning context will be lost.</text>
</svg>
