<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 390">
  <defs>
    <linearGradient id="saBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="saGlowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="saGlowAmber" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="saGlowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="390" rx="8" fill="url(#saBg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#c9d1d9" stroke-width="0.5">
    <line x1="60" y1="0" x2="60" y2="390"/>
    <line x1="120" y1="0" x2="120" y2="390"/>
    <line x1="180" y1="0" x2="180" y2="390"/>
    <line x1="240" y1="0" x2="240" y2="390"/>
    <line x1="300" y1="0" x2="300" y2="390"/>
    <line x1="360" y1="0" x2="360" y2="390"/>
    <line x1="420" y1="0" x2="420" y2="390"/>
    <line x1="480" y1="0" x2="480" y2="390"/>
    <line x1="540" y1="0" x2="540" y2="390"/>
    <line x1="600" y1="0" x2="600" y2="390"/>
    <line x1="660" y1="0" x2="660" y2="390"/>
  </g>

  <!-- Decorative corners -->
  <g stroke="#30363d" stroke-width="1" fill="none" opacity="0.3">
    <polyline points="15,35 15,15 35,15"/>
    <polyline points="665,15 685,15 685,35"/>
    <polyline points="685,355 685,375 665,375"/>
    <polyline points="35,375 15,375 15,355"/>
  </g>

  <!-- Title -->
  <text x="350" y="42" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="16" font-weight="700" fill="#e6edf3">WITH SUBAGENTS</text>

  <!-- Scale: x=50 to x=650 = 600px = 180K tokens, 3.33px per 1K -->
  <!-- 100K at x=383, 150K at x=550 -->

  <!-- 100K reference line (dashed, spanning all bars) -->
  <line x1="383" y1="58" x2="383" y2="310" stroke="#22c55e" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- ======================== -->
  <!-- BAR 1: ORCHESTRATOR      -->
  <!-- ======================== -->
  <text x="50" y="68" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" font-weight="600" fill="#8b949e">ORCHESTRATOR</text>

  <!-- Green zone background: full bar outline -->
  <rect x="50" y="74" width="600" height="40" rx="6" fill="#22c55e" opacity="0.04" stroke="#30363d" stroke-width="0.5"/>

  <!-- Planning 50K: 167px -->
  <rect x="50" y="74" width="167" height="40" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" filter="url(#saGlowGreen)"/>
  <text x="133" y="98" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="600" fill="#86efac">Planning</text>

  <!-- Coordination 10K: 33px -->
  <line x1="217" y1="74" x2="217" y2="114" stroke="#8b949e" stroke-width="0.5" opacity="0.4"/>
  <rect x="217" y="74" width="33" height="40" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" filter="url(#saGlowGreen)"/>
  <text x="233" y="98" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="9" font-weight="600" fill="#86efac">Coord</text>

  <!-- Total label -->
  <text x="262" y="98" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" fill="#8b949e">60K</text>

  <!-- ======================== -->
  <!-- BAR 2: BE ENGINEER       -->
  <!-- ======================== -->
  <text x="50" y="138" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" font-weight="600" fill="#8b949e">BE ENGINEER</text>

  <!-- Full bar outline -->
  <rect x="50" y="144" width="600" height="40" rx="6" fill="#22c55e" opacity="0.04" stroke="#30363d" stroke-width="0.5"/>

  <!-- Rules 8K: 27px -->
  <rect x="50" y="144" width="27" height="40" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" filter="url(#saGlowGreen)"/>
  <text x="63" y="163" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="7" font-weight="600" fill="#86efac">BE</text>
  <text x="63" y="172" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="7" font-weight="600" fill="#86efac">Rules</text>

  <!-- Explore 15K: 50px -->
  <line x1="77" y1="144" x2="77" y2="184" stroke="#8b949e" stroke-width="0.5" opacity="0.4"/>
  <rect x="77" y="144" width="50" height="40" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" filter="url(#saGlowGreen)"/>
  <text x="102" y="168" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" font-weight="600" fill="#86efac">Explore</text>

  <!-- Coding 35K: 117px -->
  <line x1="127" y1="144" x2="127" y2="184" stroke="#8b949e" stroke-width="0.5" opacity="0.4"/>
  <rect x="127" y="144" width="117" height="40" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" filter="url(#saGlowGreen)"/>
  <text x="185" y="168" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="600" fill="#86efac">BE Coding</text>

  <!-- Total label -->
  <text x="256" y="168" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" fill="#8b949e">58K</text>

  <!-- ======================== -->
  <!-- BAR 3: FE ENGINEER       -->
  <!-- ======================== -->
  <text x="50" y="208" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" font-weight="600" fill="#8b949e">FE ENGINEER</text>

  <!-- Full bar outline -->
  <rect x="50" y="214" width="600" height="40" rx="6" fill="#22c55e" opacity="0.04" stroke="#30363d" stroke-width="0.5"/>

  <!-- Rules 8K: 27px -->
  <rect x="50" y="214" width="27" height="40" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" filter="url(#saGlowGreen)"/>
  <text x="63" y="233" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="7" font-weight="600" fill="#86efac">FE</text>
  <text x="63" y="242" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="7" font-weight="600" fill="#86efac">Rules</text>

  <!-- Explore 15K: 50px -->
  <line x1="77" y1="214" x2="77" y2="254" stroke="#8b949e" stroke-width="0.5" opacity="0.4"/>
  <rect x="77" y="214" width="50" height="40" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" filter="url(#saGlowGreen)"/>
  <text x="102" y="238" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" font-weight="600" fill="#86efac">Explore</text>

  <!-- Coding 35K: 117px -->
  <line x1="127" y1="214" x2="127" y2="254" stroke="#8b949e" stroke-width="0.5" opacity="0.4"/>
  <rect x="127" y="214" width="117" height="40" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" filter="url(#saGlowGreen)"/>
  <text x="185" y="238" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="600" fill="#86efac">FE Coding</text>

  <!-- Total label -->
  <text x="256" y="238" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" fill="#8b949e">58K</text>

  <!-- ======================== -->
  <!-- BAR 4: TEST ENGINEER     -->
  <!-- ======================== -->
  <text x="50" y="278" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" font-weight="600" fill="#8b949e">TEST ENGINEER</text>

  <!-- Full bar outline -->
  <rect x="50" y="284" width="600" height="40" rx="6" fill="#22c55e" opacity="0.04" stroke="#30363d" stroke-width="0.5"/>

  <!-- Rules 5K: 17px -->
  <rect x="50" y="284" width="17" height="40" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" filter="url(#saGlowGreen)"/>

  <!-- Explore 10K: 33px -->
  <line x1="67" y1="284" x2="67" y2="324" stroke="#8b949e" stroke-width="0.5" opacity="0.4"/>
  <rect x="67" y="284" width="33" height="40" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" filter="url(#saGlowGreen)"/>
  <text x="83" y="308" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="9" font-weight="600" fill="#86efac">Explore</text>

  <!-- Writing 25K: 83px -->
  <line x1="100" y1="284" x2="100" y2="324" stroke="#8b949e" stroke-width="0.5" opacity="0.4"/>
  <rect x="100" y="284" width="83" height="40" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" filter="url(#saGlowGreen)"/>
  <text x="141" y="308" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="12" font-weight="600" fill="#86efac">Tests</text>

  <!-- Total label -->
  <text x="195" y="308" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" fill="#8b949e">40K</text>

  <!-- ======================== -->
  <!-- SCALE / TICK MARKS       -->
  <!-- ======================== -->
  <line x1="50" y1="340" x2="50" y2="348" stroke="#8b949e" stroke-width="1"/>
  <line x1="383" y1="340" x2="383" y2="348" stroke="#8b949e" stroke-width="1"/>
  <line x1="550" y1="340" x2="550" y2="348" stroke="#8b949e" stroke-width="1"/>
  <line x1="650" y1="340" x2="650" y2="348" stroke="#8b949e" stroke-width="1"/>

  <text x="50" y="362" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#8b949e">0K</text>
  <text x="383" y="362" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#8b949e">100K</text>
  <text x="550" y="362" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" fill="#8b949e">150K</text>

  <!-- Summary text -->
  <text x="350" y="385" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="11" font-weight="600" fill="#86efac">Every agent stays in the green zone. No context rot.</text>
</svg>
